stages:
  data_fetch:
    cmd: python src/fetch_data.py
    deps:
    - src/fetch_data.py
    - API CONNECT/oanda.cfg
    params:
    - data_fetch.config_path
    - data_fetch.instrument
    - data_fetch.start
    - data_fetch.end
    - data_fetch.granularity
    - data_fetch.output
    outs:
    - data/raw/data.csv
  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/processed/merged_data.csv
    - src/preprocess.py
    params:
    - preprocess.input
    - preprocess.lags
    - preprocess.output
    outs:
    - data/processed/data_clean.csv
  train:
    cmd: python src/train.py
    deps:
    - data/processed/data_clean.csv
    - src/train.py
    params:
    - train.data_path
    - train.model_path
    - train.max_depth
    - train.model
    - train.n_estimators
    - train.random_state
    outs:
    - models/model.pkl
  evaluate:
    cmd: python src/evaluate.py
    deps:
    - data/processed/data_clean.csv
    - models/model.pkl
    - src/evaluate.py
    metrics:
    - metrics.json
  merge_data:
    cmd: python src/merge_data.py
    deps:
    - data/raw/data.csv
    - data/streamed/streamed_data.csv
    - src/merge_data.py
    outs:
    - data/processed/merged_data.csv
