data_fetch:
  config_path: API CONNECT/oanda.cfg
  instrument: EUR_USD
  start: "2023-01-01"
  end: "2025-12-31"
  granularity: M1
  output: data/raw/data.csv

preprocess:
  input: data/processed/merged_data.csv
  output: data/processed/data_clean.csv
  lags: 10

train:
  data_path: data/processed/data_clean.csv
  model_path: models/model.pkl
  test_size: 0.2
  random_state: 42
  n_estimators: 2
  max_depth: 2
  model: models/model.pkl

evaluate:
  data_path: data/processed/data_clean.csv
  model_path: models/model.pkl

live_stream:
  config_path: API CONNECT/oanda.cfg
  instrument: EUR_USD
  granularity: M1
  
